<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <meta name="theme-color" content="#070a10">

  <title>Offline · Systumm Music</title>

  <style>
    :root {
      color-scheme: dark;
      font-family:
        Inter,
        system-ui,
        -apple-system,
        "Segoe UI",
        sans-serif;

      background: #070a10;
      color: #f7f9fc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      display: grid;
      place-items: center;

      min-height: 100vh;
      min-height: 100dvh;

      margin: 0;
      padding: 24px;

      background:
        radial-gradient(
          circle at 20% 0,
          rgba(67, 216, 193, 0.16),
          transparent 28rem
        ),
        #070a10;
    }

    main {
      width: min(440px, 100%);

      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 24px;

      background: #111722;

      padding: 32px;

      text-align: center;
    }

    .logo {
      display: grid;
      place-items: center;

      width: 74px;
      height: 74px;

      margin: 0 auto 20px;

      border-radius: 23px;

      background:
        linear-gradient(
          145deg,
          #7df38a,
          #43d8c1,
          #8d83ff
        );

      color: #07110a;

      font-size: 2rem;
      font-weight: 900;
    }

    h1 {
      margin: 0 0 10px;
    }

    p {
      margin: 0 0 22px;

      color: #9ba8bd;
      line-height: 1.55;
    }

    button {
      min-height: 46px;

      border: 0;
      border-radius: 999px;

      background: #72ef80;
      color: #07110a;

      padding: 10px 19px;

      font: inherit;
      font-weight: 850;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <main>
    <div class="logo" aria-hidden="true">
      ♪
    </div>

    <h1>You are offline</h1>

    <p>
      Reconnect to the internet to browse or start
      music. A track already buffered by the browser
      may continue playing.
    </p>

    <button
      type="button"
      onclick="window.location.reload()"
    >
      Try again
    </button>
  </main>
</body>
</html>
