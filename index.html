<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <meta name="theme-color" content="#070a10">

  <meta
    name="description"
    content="Discover trending songs, new releases and Hindi playlists with Systumm Music."
  >

  <meta
    name="application-name"
    content="Systumm Music"
  >

  <meta
    name="mobile-web-app-capable"
    content="yes"
  >

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  >

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  >

  <meta
    name="referrer"
    content="no-referrer"
  >

  <link
    rel="manifest"
    href="/manifest.webmanifest"
  >

  <link
    rel="icon"
    type="image/png"
    sizes="192x192"
    href="/icons/icon-192.png"
  >

  <link
    rel="apple-touch-icon"
    sizes="180x180"
    href="/icons/icon-180.png"
  >

  <link
    rel="preconnect"
    href="https://songs.systumm-bot.workers.dev"
    crossorigin
  >

  <link
    rel="preconnect"
    href="https://aac.saavncdn.com"
    crossorigin
  >

  <title>Systumm Music</title>
</head>

<body>
  <div id="app"></div>

  <script
    type="module"
    src="/src/main.js"
  ></script>
</body>
</html>
